<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tali Medicals – Hospital Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       TALI MEDICALS — DESIGN TOKENS
       ✏️  CUSTOMISE: Change colours, fonts, or spacing here.
       ============================================================ */
    :root {
      --brand-primary:   #1A6BB5;   /* Main blue  */
      --brand-dark:      #0D3F6E;   /* Deep navy  */
      --brand-light:     #E8F2FC;   /* Pale blue  */
      --brand-accent:    #2ABFBF;   /* Teal accent */
      --success:         #22C55E;
      --warning:         #F59E0B;
      --danger:          #EF4444;
      --neutral-50:      #F8FAFC;
      --neutral-100:     #F1F5F9;
      --neutral-200:     #E2E8F0;
      --neutral-300:     #CBD5E1;
      --neutral-500:     #64748B;
      --neutral-700:     #334155;
      --neutral-900:     #0F172A;
      --sidebar-w:       260px;
      --topbar-h:        64px;
      --radius:          12px;
      --radius-sm:       8px;
      --shadow:          0 4px 24px rgba(26,107,181,.10);
      --shadow-sm:       0 2px 8px rgba(0,0,0,.06);
      --font-body:       'DM Sans', sans-serif;
      --font-display:    'DM Serif Display', serif;
      --transition:      .2s cubic-bezier(.4,0,.2,1);

      /* ============================================================
         ✏️  FACILITY INFO — Change these to match your clinic
         ============================================================ */
      --facility-name:   "Tali Medicals";
      --facility-tagline:"Compassionate Care, Professional Excellence";
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html { font-size:15px; }
    body {
      font-family: var(--font-body);
      background: var(--neutral-50);
      color: var(--neutral-900);
      min-height: 100vh;
    }

    /* ── SCROLLBAR ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--neutral-300); border-radius:99px; }

    /* ── AUTH SCREEN ────────────────────────────────────────────── */
    #auth-screen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-primary) 60%, var(--brand-accent) 100%);
      position:relative; overflow:hidden;
    }
    #auth-screen::before {
      content:''; position:absolute; inset:0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .auth-card {
      background:#fff; border-radius:20px;
      padding:48px 40px; width:100%; max-width:440px;
      box-shadow:0 24px 80px rgba(0,0,0,.25);
      position:relative; z-index:1;
      animation: slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .auth-logo {
      text-align:center; margin-bottom:32px;
    }
    .auth-logo .logo-icon {
      width:64px; height:64px; border-radius:16px;
      background:linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      display:inline-flex; align-items:center; justify-content:center;
      font-size:28px; margin-bottom:12px;
    }
    .auth-logo h1 {
      font-family:var(--font-display); font-size:1.8rem;
      color:var(--brand-dark); line-height:1;
    }
    .auth-logo p {
      font-size:.8rem; color:var(--neutral-500); margin-top:4px;
    }
    .form-group { margin-bottom:20px; }
    .form-group label {
      display:block; font-size:.8rem; font-weight:600;
      color:var(--neutral-700); margin-bottom:6px; letter-spacing:.02em;
      text-transform:uppercase;
    }
    .form-control {
      width:100%; padding:12px 16px; border-radius:var(--radius-sm);
      border:1.5px solid var(--neutral-200);
      font-family:var(--font-body); font-size:.95rem;
      color:var(--neutral-900); background:#fff;
      transition:border-color var(--transition), box-shadow var(--transition);
      outline:none;
    }
    .form-control:focus {
      border-color:var(--brand-primary);
      box-shadow:0 0 0 3px rgba(26,107,181,.12);
    }
    select.form-control { cursor:pointer; }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:11px 20px; border-radius:var(--radius-sm);
      font-family:var(--font-body); font-size:.9rem; font-weight:600;
      cursor:pointer; border:none; transition:all var(--transition);
      text-decoration:none; white-space:nowrap;
    }
    .btn-primary {
      background:var(--brand-primary); color:#fff;
    }
    .btn-primary:hover { background:var(--brand-dark); transform:translateY(-1px); box-shadow:0 4px 16px rgba(26,107,181,.3); }
    .btn-secondary { background:var(--neutral-100); color:var(--neutral-700); }
    .btn-secondary:hover { background:var(--neutral-200); }
    .btn-success { background:var(--success); color:#fff; }
    .btn-success:hover { filter:brightness(.92); }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover { filter:brightness(.92); }
    .btn-warning { background:var(--warning); color:#fff; }
    .btn-sm { padding:7px 14px; font-size:.82rem; }
    .btn-block { width:100%; justify-content:center; padding:14px; font-size:1rem; }
    .btn-outline {
      background:transparent; border:1.5px solid var(--brand-primary);
      color:var(--brand-primary);
    }
    .btn-outline:hover { background:var(--brand-light); }

    /* ── APP SHELL ──────────────────────────────────────────────── */
    #app { display:none; }
    #app.active { display:flex; min-height:100vh; }

    /* ── SIDEBAR ────────────────────────────────────────────────── */
    .sidebar {
      width:var(--sidebar-w); background:var(--brand-dark);
      display:flex; flex-direction:column;
      position:fixed; top:0; left:0; bottom:0; z-index:100;
      transition:transform var(--transition);
      overflow-y:auto; overflow-x:hidden;
    }
    .sidebar-header {
      padding:24px 20px 20px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo {
      display:flex; align-items:center; gap:12px;
    }
    .sidebar-logo .s-icon {
      width:40px; height:40px; border-radius:10px;
      background:linear-gradient(135deg,var(--brand-primary),var(--brand-accent));
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .sidebar-logo h2 {
      font-family:var(--font-display); font-size:1.1rem;
      color:#fff; line-height:1.1;
    }
    .sidebar-logo span {
      font-size:.7rem; color:rgba(255,255,255,.5);
      font-family:var(--font-body); font-weight:400;
    }
    .sidebar-user {
      padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sidebar-user p { font-size:.7rem; color:rgba(255,255,255,.4); margin-bottom:4px; text-transform:uppercase; letter-spacing:.06em; }
    .sidebar-user strong { font-size:.9rem; color:#fff; display:block; }
    .sidebar-user em { font-size:.78rem; color:var(--brand-accent); font-style:normal; }

    .nav-section { padding:16px 12px 8px; }
    .nav-section-label {
      font-size:.65rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:rgba(255,255,255,.3);
      padding:0 8px; margin-bottom:6px;
    }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:var(--radius-sm);
      color:rgba(255,255,255,.65); font-size:.88rem; font-weight:500;
      cursor:pointer; transition:all var(--transition); margin-bottom:2px;
    }
    .nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
    .nav-item.active { background:var(--brand-primary); color:#fff; }
    .nav-item .nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-footer {
      margin-top:auto; padding:16px 12px;
      border-top:1px solid rgba(255,255,255,.08);
    }
    .sidebar-footer .nav-item { color:rgba(255,255,255,.5); }

    /* ── MAIN AREA ─────────────────────────────────────────────── */
    .main-area {
      margin-left:var(--sidebar-w);
      flex:1; display:flex; flex-direction:column;
      min-width:0;
    }
    .topbar {
      height:var(--topbar-h); background:#fff;
      border-bottom:1px solid var(--neutral-200);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; position:sticky; top:0; z-index:50;
      box-shadow:var(--shadow-sm);
    }
    .topbar-left h3 {
      font-size:1.1rem; font-weight:600; color:var(--neutral-900);
    }
    .topbar-left p { font-size:.78rem; color:var(--neutral-500); }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .topbar-badge {
      background:var(--brand-light); color:var(--brand-primary);
      border-radius:99px; padding:4px 12px; font-size:.78rem; font-weight:600;
    }
    .logout-btn {
      padding:8px 16px; border-radius:var(--radius-sm);
      background:transparent; border:1.5px solid var(--neutral-200);
      font-family:var(--font-body); font-size:.82rem; font-weight:600;
      color:var(--neutral-700); cursor:pointer;
      transition:all var(--transition);
    }
    .logout-btn:hover { border-color:var(--danger); color:var(--danger); }

    .page-content { padding:28px; flex:1; }

    /* ── PAGES ─────────────────────────────────────────────────── */
    .page { display:none; animation:fadeIn .25s ease; }
    .page.active { display:block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── STATS GRID ─────────────────────────────────────────────── */
    .stats-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
      gap:16px; margin-bottom:28px;
    }
    .stat-card {
      background:#fff; border-radius:var(--radius);
      padding:20px 20px 16px;
      border:1px solid var(--neutral-200);
      display:flex; flex-direction:column; gap:8px;
      transition:box-shadow var(--transition), transform var(--transition);
    }
    .stat-card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
    .stat-card .stat-icon {
      width:40px; height:40px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .stat-card .stat-label { font-size:.75rem; color:var(--neutral-500); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
    .stat-card .stat-value { font-size:1.8rem; font-weight:700; color:var(--neutral-900); line-height:1; }
    .stat-card .stat-sub { font-size:.75rem; color:var(--neutral-500); }
    .bg-blue { background:var(--brand-light); color:var(--brand-primary); }
    .bg-green { background:#DCFCE7; color:#16A34A; }
    .bg-orange { background:#FEF3C7; color:#D97706; }
    .bg-red { background:#FEE2E2; color:#DC2626; }
    .bg-purple { background:#F3E8FF; color:#9333EA; }
    .bg-teal { background:#CCFBF1; color:#0D9488; }
    .bg-pink { background:#FCE7F3; color:#DB2777; }
    .bg-indigo { background:#E0E7FF; color:#4F46E5; }

    /* ── CARDS & PANELS ────────────────────────────────────────── */
    .card {
      background:#fff; border-radius:var(--radius);
      border:1px solid var(--neutral-200); margin-bottom:20px;
    }
    .card-header {
      padding:16px 20px; border-bottom:1px solid var(--neutral-200);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .card-header h4 { font-size:.95rem; font-weight:700; color:var(--neutral-900); }
    .card-body { padding:20px; }

    /* ── TABLES ────────────────────────────────────────────────── */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead th {
      font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
      color:var(--neutral-500); padding:10px 14px; text-align:left;
      background:var(--neutral-50); border-bottom:1px solid var(--neutral-200);
    }
    tbody td {
      padding:12px 14px; border-bottom:1px solid var(--neutral-100);
      font-size:.88rem; color:var(--neutral-700); vertical-align:middle;
    }
    tbody tr:hover td { background:var(--neutral-50); }
    tbody tr:last-child td { border-bottom:none; }
    .td-actions { display:flex; gap:6px; flex-wrap:wrap; }

    /* ── BADGES ────────────────────────────────────────────────── */
    .badge {
      display:inline-block; padding:3px 10px; border-radius:99px;
      font-size:.72rem; font-weight:700; letter-spacing:.02em;
    }
    .badge-success { background:#DCFCE7; color:#16A34A; }
    .badge-warning { background:#FEF3C7; color:#D97706; }
    .badge-danger  { background:#FEE2E2; color:#DC2626; }
    .badge-info    { background:var(--brand-light); color:var(--brand-primary); }
    .badge-neutral { background:var(--neutral-100); color:var(--neutral-500); }

    /* ── MODAL ─────────────────────────────────────────────────── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,.45); backdrop-filter:blur(2px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:#fff; border-radius:var(--radius); width:100%; max-width:540px;
      max-height:90vh; overflow-y:auto;
      box-shadow:0 24px 80px rgba(0,0,0,.2);
      animation:slideUp .25s ease;
    }
    .modal-lg { max-width:720px; }
    .modal-header {
      padding:20px 24px; border-bottom:1px solid var(--neutral-200);
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-header h3 { font-size:1rem; font-weight:700; }
    .modal-close {
      width:32px; height:32px; border-radius:50%; border:none;
      background:var(--neutral-100); color:var(--neutral-500);
      font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background var(--transition);
    }
    .modal-close:hover { background:var(--neutral-200); }
    .modal-body { padding:24px; }
    .modal-footer {
      padding:16px 24px; border-top:1px solid var(--neutral-200);
      display:flex; justify-content:flex-end; gap:10px;
    }

    /* ── FORM GRID ─────────────────────────────────────────────── */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-grid .full { grid-column:1/-1; }
    textarea.form-control { min-height:90px; resize:vertical; }
    .form-help { font-size:.75rem; color:var(--neutral-500); margin-top:4px; }

    /* ── TOAST NOTIFICATION ─────────────────────────────────────── */
    #toast {
      position:fixed; bottom:24px; right:24px; z-index:999;
      background:var(--neutral-900); color:#fff;
      padding:14px 20px; border-radius:var(--radius-sm);
      font-size:.88rem; font-weight:500;
      box-shadow:0 8px 32px rgba(0,0,0,.25);
      transform:translateY(80px); opacity:0;
      transition:all .3s cubic-bezier(.4,0,.2,1);
      max-width:340px; display:flex; align-items:center; gap:10px;
    }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.toast-success { background:#166534; }
    #toast.toast-error   { background:#991B1B; }

    /* ── SEARCH BAR ─────────────────────────────────────────────── */
    .search-bar {
      display:flex; gap:10px; align-items:center; margin-bottom:16px;
    }
    .search-input {
      flex:1; max-width:320px; padding:9px 14px;
      border:1.5px solid var(--neutral-200); border-radius:var(--radius-sm);
      font-family:var(--font-body); font-size:.88rem;
      transition:border-color var(--transition);
    }
    .search-input:focus { outline:none; border-color:var(--brand-primary); }

    /* ── NOTICE BOARD ───────────────────────────────────────────── */
    .notice-item {
      padding:14px 16px; border-radius:var(--radius-sm);
      border-left:3px solid var(--brand-primary);
      background:var(--brand-light); margin-bottom:10px;
    }
    .notice-item h5 { font-size:.88rem; font-weight:700; color:var(--brand-dark); }
    .notice-item p  { font-size:.82rem; color:var(--neutral-700); margin-top:4px; }
    .notice-item span { font-size:.72rem; color:var(--neutral-500); }

    /* ── PRINT INVOICE ──────────────────────────────────────────── */
    .invoice-print { padding:24px; }
    .invoice-print h2 { font-family:var(--font-display); color:var(--brand-dark); }

    /* ── SECTION PAGE HEADER ──────────────────────────────────── */
    .page-header {
      display:flex; align-items:flex-start; justify-content:space-between;
      margin-bottom:24px; gap:16px; flex-wrap:wrap;
    }
    .page-header h2 {
      font-size:1.4rem; font-weight:700; color:var(--neutral-900);
    }
    .page-header p { font-size:.85rem; color:var(--neutral-500); margin-top:2px; }

    /* ── EMPTY STATE ─────────────────────────────────────────────── */
    .empty-state {
      text-align:center; padding:48px 24px; color:var(--neutral-500);
    }
    .empty-state .es-icon { font-size:40px; margin-bottom:12px; }
    .empty-state p { font-size:.9rem; }

    /* ── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width:768px) {
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .main-area { margin-left:0; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .form-grid { grid-template-columns:1fr; }
      .topbar { padding:0 16px; }
      .page-content { padding:16px; }
    }

    /* ── PRINTABLE ────────────────────────────────────────────────── */
    @media print {
      .sidebar, .topbar, .no-print { display:none !important; }
      .main-area { margin-left:0; }
      body { background:#fff; }
    }

    /* ── PROFILE CARD ──────────────────────────────────────────── */
    .profile-card {
      display:flex; align-items:center; gap:16px;
      padding:20px; background:var(--brand-light);
      border-radius:var(--radius); margin-bottom:20px;
    }
    .profile-avatar {
      width:56px; height:56px; border-radius:50%;
      background:var(--brand-primary); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:700; flex-shrink:0;
      font-family:var(--font-display);
    }
    .profile-info h4 { font-size:1rem; font-weight:700; color:var(--brand-dark); }
    .profile-info p  { font-size:.82rem; color:var(--neutral-500); }

    /* ── TAB NAV ─────────────────────────────────────────────────── */
    .tab-nav {
      display:flex; gap:4px; background:var(--neutral-100);
      border-radius:var(--radius-sm); padding:4px; margin-bottom:20px;
      flex-wrap:wrap;
    }
    .tab-btn {
      padding:8px 16px; border-radius:6px; border:none;
      font-family:var(--font-body); font-size:.82rem; font-weight:600;
      cursor:pointer; transition:all var(--transition);
      background:transparent; color:var(--neutral-500);
    }
    .tab-btn.active { background:#fff; color:var(--brand-primary); box-shadow:var(--shadow-sm); }

    /* ── MOBILE MENU BTN ─────────────────────────────────────────── */
    .mobile-menu-btn {
      display:none; background:none; border:none; font-size:22px;
      cursor:pointer; color:var(--neutral-700); padding:4px;
    }
    @media (max-width:768px) { .mobile-menu-btn { display:block; } }

    /* ─── BLOOD TYPE PILLS ─────────────────────────────────────── */
    .blood-pill {
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:50%; font-weight:700;
      font-size:.82rem; background:#FEE2E2; color:#DC2626;
    }

    /* ── CALENDAR MINI ───────────────────────────────────────────── */
    .apt-slot {
      display:flex; gap:12px; align-items:center;
      padding:12px; border:1px solid var(--neutral-200);
      border-radius:var(--radius-sm); margin-bottom:8px;
      background:#fff;
    }
    .apt-slot .slot-date {
      width:44px; text-align:center; flex-shrink:0;
    }
    .apt-slot .slot-date .day { font-size:1.3rem; font-weight:700; color:var(--brand-primary); line-height:1; }
    .apt-slot .slot-date .mon { font-size:.68rem; color:var(--neutral-500); text-transform:uppercase; }
    .apt-slot .slot-info h5 { font-size:.88rem; font-weight:600; }
    .apt-slot .slot-info p  { font-size:.78rem; color:var(--neutral-500); }
  </style>
</head>
<body>

<!-- ================================================================
     AUTH SCREEN
     ✏️  CUSTOMISE: Change default passwords in the JS section below
     (search for "DEFAULT ACCOUNTS")
================================================================ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏥</div>
      <h1>Tali Medicals</h1>
      <!-- ✏️ CUSTOMISE: Change tagline below -->
      <p>Compassionate Care, Professional Excellence</p>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select class="form-control" id="login-role">
        <option value="admin">Administrator</option>
        <option value="doctor">Doctor</option>
        <option value="nurse">Nurse</option>
        <option value="pharmacist">Pharmacist</option>
        <option value="laboratorist">Laboratorist</option>
        <option value="accountant">Accountant</option>
        <option value="patient">Patient</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email / Username</label>

/* ================================================================

================================================================ */

/* ================================================================

   ✏️  CUSTOMISE: Change usernames and passwords before going live.
       After first login as admin, go to Staff Management to add

================================================================ */
const DEFAULT_ACCOUNTS = {
  admin:        { email:'admin@tali.com',       password:'admin123',    name:'System Admin',      id:'ADM001' },
  doctor:       { email:'doctor@tali.com',      password:'doctor123',   name:'Dr. A. Johnson',    id:'DOC001' },

  pharmacist:   { email:'pharma@tali.com',      password:'pharma123',   name:'Ph. C. Davis',      id:'PHA001' },

};

/* ================================================================
   DATA LAYER  (localStorage)
   All data lives in localStorage under key "tali_hms"
================================================================ */
const DB = {
  _key: 'tali_hms_v1',
  _defaults() {
    return {
      patients:      [],
      doctors:       [],
      nurses:        [],
      pharmacists:   [],
      laboratorists: [],
      accountants:   [],
      appointments:  [],
      prescriptions: [],
      medicines:     [],
      medicineCategories: [],
      beds:          [],
      bedAllotments: [],
      invoices:      [],
      payments:      [],
      labResults:    [],
      bloodDonors:   [],
      noticeboard:   [],
      departments:   CONFIG.defaultDepartments.map((n,i)=>({id:'DEP'+(i+1),name:n,description:''})),
      staff:         [],  // unified staff store (all roles)
      settings: {
        facilityName:    CONFIG.facilityName,
        facilityAddress: CONFIG.facilityAddress,
        facilityPhone:   CONFIG.facilityPhone,
        facilityEmail:   CONFIG.facilityEmail,
      }
    };
  },
  load() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? { ...this._defaults(), ...JSON.parse(raw) } : this._defaults();
    } catch { return this._defaults(); }
  },
  save(data) {
    localStorage.setItem(this._key, JSON.stringify(data));
  },
  get()           { return this.load(); },
  set(cb)         { const d = this.load(); cb(d); this.save(d); },
  uid(prefix='')  { return prefix + Date.now() + Math.random().toString(36).slice(2,6).toUpperCase(); },
  today()         { return new Date().toISOString().split('T')[0]; },
  fmt(dateStr)    {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
  },
  fmtDT(dateStr)  {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }
};

/* ================================================================
   AUTH
================================================================ */
let SESSION = null;

function doLogin() {
  const role  = el('login-role').value;
  const email = el('login-email').value.trim();
  const pass  = el('login-pass').value;
  const acct  = DEFAULT_ACCOUNTS[role];

  // Check built-in accounts
  if (acct && email === acct.email && pass === acct.password) {
    SESSION = { role, name: acct.name, id: acct.id };
    startApp();
    return;
  }
  // Check DB staff accounts
  const db = DB.get();
  const pool = {
    doctor:       db.doctors,
    nurse:        db.nurses,
    pharmacist:   db.pharmacists,
    laboratorist: db.laboratorists,
    accountant:   db.accountants,
    patient:      db.patients,
  }[role] || [];
  const found = pool.find(u => u.email === email && u.password === pass);
  if (found) {
    SESSION = { role, name: found.name, id: found.id };
    startApp();
    return;
  }
  showToast('Invalid credentials. Please try again.', 'error');
}

function doLogout() {
  SESSION = null;
  el('app').classList.remove('active');
  el('auth-screen').style.display = 'flex';
  el('login-pass').value = '';
}

function startApp() {
  el('auth-screen').style.display = 'none';
  el('app').classList.add('active');
  el('sb-name').textContent = SESSION.name;
  el('sb-role').textContent = SESSION.role.charAt(0).toUpperCase() + SESSION.role.slice(1);
  el('topbar-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  buildSidebar();
  navigate(NAV[SESSION.role][0].page);
}

================================================================ */

    { icon:'📈', label:'Reports',         page:'reports',    section:'Records' },
    { icon:'🩸', label:'Blood Bank',      page:'bloodbank' },
  ],
  nurse: [

    { icon:'📊', label:'Dashboard',       page:'dash-pharma' },

function buildSidebar() {
  const items = NAV[SESSION.role] || [];
  let html = ''; let lastSection = null;
  items.forEach(item => {
    if (item.section && item.section !== lastSection) {
      html += `<div class="nav-section-label" style="padding:12px 20px 4px;font-size:.62rem;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;font-weight:700">${item.section}</div>`;
      lastSection = item.section;
    }
    html += `<div class="nav-item" id="nav-${item.page}" onclick="navigate('${item.page}')">
      <span class="nav-icon">${item.icon}</span> ${item.label}
    </div>`;
  });
  el('sidebar-nav').innerHTML = `<div style="padding:8px 12px">${html}</div>`;
}

let currentPage = '';
function navigate(page) {
  currentPage = page;
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = el('nav-' + page);
  if (navEl) navEl.classList.add('active');
  // Update page title
  const item = (NAV[SESSION.role]||[]).find(i=>i.page===page);
  el('page-title').textContent   = item ? item.label : page;
  el('page-subtitle').textContent = CONFIG.facilityName + ' · ' + SESSION.role;
  // Render page
  el('page-content').innerHTML = renderPage(page);
  // Close mobile sidebar
  el('sidebar').classList.remove('open');
}

function toggleSidebar() { el('sidebar').classList.toggle('open'); }

/* ================================================================

================================================================ */
function renderPage(page) {
  const renders = {
    'dash-admin':    renderAdminDash,
    'dash-doctor':   renderDoctorDash,
    'dash-nurse':    renderNurseDash,
    'dash-pharma':   renderPharmaDash,
    'dash-lab':      renderLabDash,
    'dash-accounts': renderAccountsDash,
    'dash-patient':  renderPatientDash,
    'patients':      renderPatients,
    'doctors':       renderDoctors,
    'nurses':        renderNurses,
    'pharmacists':   renderPharmacists,
    'laboratorists': renderLaboratorists,
    'accountants':   renderAccountants,
    'departments':   renderDepartments,
    'beds':          renderBeds,
    'appointments':  renderAppointments,
    'prescriptions': renderPrescriptions,
    'invoices':      renderInvoices,
    'payments':      renderPayments,
    'medicines':     renderMedicines,
    'med-cats':      renderMedCats,

    'blood-donors':  renderBloodDonors,
    'reports':       renderReports,
    'noticeboard':   renderNoticeboard,
    'settings':      renderSettings,
  };
  return (renders[page] || (() => `<div class="empty-state"><div class="es-icon">🔧</div><p>Page under construction</p></div>`))();
}

/* ─── DASHBOARDS ──────────────────────────────────────────────── */
function statCard(icon,label,value,colorClass,sub='') {
  return `<div class="stat-card">
    <div class="stat-icon ${colorClass}">${icon}</div>
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${sub?`<div class="stat-sub">${sub}</div>`:''}
  </div>`;
}

function renderAdminDash() {
  const d = DB.get();
  const today = DB.today();
  const todayApts = d.appointments.filter(a=>a.date===today).length;
  const pendingInv = d.invoices.filter(i=>i.status!=='paid').length;
  const occupied = d.beds.filter(b=>b.status==='occupied').length;
  return `
  <div class="stats-grid">
    ${statCard('👤','Total Patients',d.patients.length,'bg-blue','Registered')}
    ${statCard('👨‍⚕️','Doctors',d.doctors.length,'bg-green','')}
    ${statCard('📅','Today\'s Apts',todayApts,'bg-orange','Scheduled')}
    ${statCard('🛏️','Beds Occupied',occupied+' / '+d.beds.length,'bg-red','')}
    ${statCard('💊','Medicines',d.medicines.length,'bg-purple','In stock')}
    ${statCard('🧾','Pending Bills',pendingInv,'bg-warning','Invoices')}
    ${statCard('🩸','Blood Donors',d.bloodDonors.length,'bg-pink','')}
    ${statCard('📢','Notices',d.noticeboard.length,'bg-indigo','')}
  </div>
  ${renderNoticeSection(d)}
  ${renderRecentPatients(d)}`;
}

function renderDoctorDash() {
  const d = DB.get(); const today = DB.today();
  const myApts = d.appointments.filter(a=>a.doctorId===SESSION.id&&a.date===today);
  const myPatients = d.prescriptions.filter(p=>p.doctorId===SESSION.id).map(p=>p.patientId);
  const uniquePats = [...new Set(myPatients)].length;
  return `
  <div class="stats-grid">
    ${statCard('📅','Today\'s Apts',myApts.length,'bg-blue','Scheduled')}
    ${statCard('👤','My Patients',uniquePats,'bg-green','Total seen')}
    ${statCard('📝','Prescriptions',d.prescriptions.filter(p=>p.doctorId===SESSION.id).length,'bg-orange','')}
    ${statCard('🛏️','Beds',d.beds.filter(b=>b.status==='occupied').length,'bg-red','Occupied')}
  </div>
  ${renderTodayAppointments(d,today)}`;
}

function renderNurseDash() {
  const d = DB.get();
  return `
  <div class="stats-grid">
    ${statCard('👤','Total Patients',d.patients.length,'bg-blue','')}
    ${statCard('🛏️','Available Beds',d.beds.filter(b=>b.status==='available').length,'bg-green','')}
    ${statCard('🛏️','Occupied Beds',d.beds.filter(b=>b.status==='occupied').length,'bg-red','')}
    ${statCard('📢','Notices',d.noticeboard.length,'bg-orange','')}
  </div>
  ${renderNoticeSection(d)}`;
}

function renderPharmaDash() {
  const d = DB.get();
  const low = d.medicines.filter(m=>parseInt(m.stock||0)<10).length;
  return `
  <div class="stats-grid">
    ${statCard('💊','Total Medicines',d.medicines.length,'bg-blue','')}
    ${statCard('🗂️','Categories',d.medicineCategories.length,'bg-green','')}
    ${statCard('⚠️','Low Stock',low,'bg-red','<10 units')}
    ${statCard('📝','Prescriptions',d.prescriptions.length,'bg-orange','Pending fill')}
  </div>
  ${renderMedTable(d)}`;
}

function renderLabDash() {
  const d = DB.get();
  return `
  <div class="stats-grid">
    ${statCard('🔬','Lab Results',d.labResults.length,'bg-blue','')}
    ${statCard('📝','Prescriptions',d.prescriptions.length,'bg-green','For review')}
    ${statCard('🩸','Blood Donors',d.bloodDonors.length,'bg-red','')}
    ${statCard('🏦','Blood Groups',CONFIG.bloodGroups.length,'bg-orange','Tracked')}
  </div>`;
}

function renderAccountsDash() {
  const d = DB.get();
  const totalPaid = d.payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const pending   = d.invoices.filter(i=>i.status!=='paid').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  return `
  <div class="stats-grid">
    ${statCard('🧾','Total Invoices',d.invoices.length,'bg-blue','')}
    ${statCard('✅','Paid',d.invoices.filter(i=>i.status==='paid').length,'bg-green','')}
    ${statCard('⏳','Pending',d.invoices.filter(i=>i.status!=='paid').length,'bg-warning','')}
    ${statCard('💰','Revenue',formatCurrency(totalPaid),'bg-teal','Collected')}
    ${statCard('📌','Outstanding',formatCurrency(pending),'bg-red','Unpaid')}
  </div>`;
}

function renderPatientDash() {
  const d = DB.get();
  const myApts = d.appointments.filter(a=>a.patientId===SESSION.id);
  const myPx   = d.prescriptions.filter(p=>p.patientId===SESSION.id);
  const myInv  = d.invoices.filter(i=>i.patientId===SESSION.id);
  return `
  <div class="stats-grid">
    ${statCard('📅','Appointments',myApts.length,'bg-blue','')}
    ${statCard('📝','Prescriptions',myPx.length,'bg-green','')}
    ${statCard('🧾','Bills',myInv.length,'bg-orange','')}
    ${statCard('✅','Paid Bills',myInv.filter(i=>i.status==='paid').length,'bg-teal','')}
  </div>
  ${renderNoticeSection(d)}`;
}

function renderNoticeSection(d) {
  if (!d.noticeboard.length) return '';
  return `<div class="card"><div class="card-header"><h4>📢 Noticeboard</h4></div><div class="card-body">
    ${d.noticeboard.slice(0,3).map(n=>`<div class="notice-item">
      <h5>${esc(n.title)}</h5><p>${esc(n.notice)}</p>
      <span>${DB.fmt(n.date)}</span>
    </div>`).join('')}
  </div></div>`;
}

function renderRecentPatients(d) {
  const pts = d.patients.slice(-5).reverse();
  if (!pts.length) return `<div class="empty-state"><div class="es-icon">👤</div><p>No patients registered yet. <a href="#" onclick="navigate('patients')">Register a patient →</a></p></div>`;
  return `<div class="card"><div class="card-header"><h4>Recent Patients</h4><button class="btn btn-sm btn-outline" onclick="navigate('patients')">View All</button></div><div class="card-body table-wrap">
    <table><thead><tr><th>Name</th><th>ID</th><th>Blood</th><th>Phone</th><th>Registered</th></tr></thead><tbody>
    ${pts.map(p=>`<tr><td><strong>${esc(p.name)}</strong></td><td>${esc(p.id)}</td><td><span class="blood-pill">${esc(p.bloodGroup)}</span></td><td>${esc(p.phone)}</td><td>${DB.fmt(p.createdAt)}</td></tr>`).join('')}
    </tbody></table>
  </div></div>`;
}

function renderTodayAppointments(d,today) {
  const apts = d.appointments.filter(a=>a.date===today);
  if (!apts.length) return `<div class="card"><div class="card-header"><h4>Today's Appointments</h4></div><div class="card-body"><div class="empty-state"><div class="es-icon">📅</div><p>No appointments scheduled for today.</p></div></div></div>`;
  return `<div class="card"><div class="card-header"><h4>Today's Appointments</h4></div><div class="card-body">
    ${apts.map(a=>{const pt=d.patients.find(p=>p.id===a.patientId)||{name:'Unknown'};return `<div class="apt-slot">
      <div class="slot-date"><div class="day">${new Date(a.date).getDate()}</div><div class="mon">${new Date(a.date).toLocaleString('default',{month:'short'})}</div></div>
      <div class="slot-info"><h5>${esc(pt.name)}</h5><p>${esc(a.time)||'—'} · ${esc(a.reason)||'General consultation'}</p></div>
      <span class="badge badge-${a.status==='completed'?'success':a.status==='cancelled'?'danger':'info'}" style="margin-left:auto">${a.status||'scheduled'}</span>
    </div>`}).join('')}
  </div></div>`;
}

function renderMedTable(d) {
  return `<div class="card"><div class="card-header"><h4>Medicine Inventory</h4></div><div class="card-body table-wrap">
    <table><thead><tr><th>Medicine</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th></tr></thead><tbody>
    ${d.medicines.slice(0,8).map(m=>{
      const cat=d.medicineCategories.find(c=>c.id===m.categoryId)||{name:'—'};
      const stock=parseInt(m.stock||0);
      return `<tr><td><strong>${esc(m.name)}</strong></td><td>${esc(cat.name)}</td><td>${formatCurrency(m.price)}</td><td>${stock}</td>

      name,
      email:     val('f-email'),
      password:  val('f-pass'),
      phone:     val('f-phone'),
      dob:       val('f-dob'),
      age:       val('f-age'),
      sex:       val('f-sex'),
      bloodGroup:val('f-blood'),
      address:   val('f-addr'),

  ]);

function saveStaff(role, id) {
  const name = val('f-name'); if (!name) { showToast('Name required','error'); return; }
  const email = val('f-email'); if (!email) { showToast('Email required','error'); return; }
  DB.set(d=>{
    const store = role+'s';
    if (!d[store]) d[store]=[];
    const existing = id ? d[store].find(x=>x.id===id) : null;
    const s = {
      id:           id || DB.uid(role.slice(0,3).toUpperCase()),
      name, email,
      password:     val('f-pass') || (existing&&existing.password) || 'password123',
      phone:        val('f-phone'),
      address:      val('f-addr'),
      departmentId: el('f-dept') ? val('f-dept') : undefined,
      qualification:el('f-qual') ? val('f-qual') : undefined,
      createdAt:    existing ? existing.createdAt : DB.today(),
    };
    if (id) { const i=d[store].findIndex(x=>x.id===id); if(i>-1) d[store][i]=s; }
    else d[store].push(s);
  });
  closeModal(); navigate(role+'s');
  showToast(id?'Staff updated!':'Staff added!','success');
}

function dischargePatient(allotId, bedId) {
  if (!confirm('Discharge patient from this bed?')) return;
  DB.set(d=>{
    const a=d.bedAllotments.find(x=>x.id===allotId); if(a) a.dischargedAt=DB.today();
    const b=d.beds.find(x=>x.id===bedId); if(b) b.status='available';
  }); navigate('beds'); showToast('Patient discharged','success');
}

function exportData() {
  const data = DB.get();
  const blob  = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href=url; a.download='tali_medicals_backup_'+DB.today()+'.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Data exported!','success');
}

function importData() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        localStorage.setItem(DB._key, JSON.stringify(data));
        showToast('Data imported! Refreshing...','success');
        setTimeout(()=>location.reload(),1200);
      } catch { showToast('Invalid JSON file','error'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function clearAllData() {
  if (!confirm('⚠️ This will delete ALL data permanently. Are you absolutely sure?\n\nType "DELETE" to confirm or click Cancel.')) return;
  const confirm2 = prompt('Type DELETE to confirm:');
  if (confirm2 !== 'DELETE') { showToast('Cancelled.'); return; }
  localStorage.removeItem(DB._key);
  showToast('All data cleared. Reloading...','success');
  setTimeout(()=>location.reload(),1200);
}

// ✏️ CUSTOMISE: Change currency symbol and formatting here
function getCurrency()    { return '₦'; }  // ← Change to $, £, €, GHS, etc.
function formatCurrency(n){ return getCurrency() + (parseFloat(n)||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function el(id)  { return document.getElementById(id); }
function val(id) { const e=el(id); return e?(e.value||'').trim():''; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function filterTable(input, tbodyId) {
  const q=input.value.toLowerCase();
  el(tbodyId).querySelectorAll('tr').forEach(r=>{
    r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function deleteRecord(store, id, label) {
  if (!confirm(`Delete this ${label}? This cannot be undone.`)) return;
  DB.set(d=>{ if(!d[store])return; d[store]=d[store].filter(x=>x.id!==id); });
  navigate(currentPage);
  showToast(label+' deleted.','success');
}

/* ── MODAL ──────────────────────────────────────────────────── */
function openModal(title, bodyOrSize, bodyOrBtns, btns) {
  let size='', body='', buttons=[];
  // Signature: openModal(title, body, btns) or openModal(title, 'modal-lg', body, btns)
  if(typeof bodyOrSize==='string' && (bodyOrSize==='modal-lg'||bodyOrSize==='modal-sm')) {
    size=bodyOrSize; body=bodyOrBtns; buttons=btns||[];
  } else { body=bodyOrSize; buttons=bodyOrBtns||[]; }

  const box = el('modal-box');
  box.className = 'modal' + (size?' '+size:'');
  el('modal-title').textContent = title;
  el('modal-body').innerHTML = body;
  el('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    ${buttons.map((b,i)=>`<button class="btn ${b.cls||'btn-primary'}" id="mf-btn-${i}">${b.label}</button>`).join('')}
  `;
  buttons.forEach((b,i)=>{ el('mf-btn-'+i).addEventListener('click',b.action); });
  el('modal-overlay').classList.add('open');
}

function closeModal() { el('modal-overlay').classList.remove('open'); }
function closeModalOnOverlay(e) { if(e.target===el('modal-overlay')) closeModal(); }

/* ── TOAST ──────────────────────────────────────────────────── */
let _toastTimer;
function showToast(msg, type='') {
  const t=el('toast');
  t.textContent = (type==='success'?'✅ ':type==='error'?'❌ ':'')+ msg;
  t.className = 'show' + (type?' toast-'+type:'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

/* ── INIT ────────────────────────────────────────────────────── */
window.onload = () => {
  el('login-email').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  el('login-pass').addEventListener('keydown',  e=>{ if(e.key==='Enter') doLogin(); });
};
</script>
</body>
</html>
